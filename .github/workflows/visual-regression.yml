name: Visual regression

# Runs on demand only. Snapshot baselines aren't committed yet, so running this
# on every push/PR fails noisily. Trigger manually from the Actions tab once
# baselines exist (see e2e/README.md → `bun run test:visual:update`).
on:
  workflow_dispatch:

jobs:
  playwright:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bunx playwright install --with-deps chromium webkit
      - run: bun run test:visual
        env:
          CI: "true"
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 14
